name: Build executables

on:
  workflow_dispatch:
  push:
    branches: [ master, main ]
    paths:
      - 'src/**'
      - '.github/workflows/build.yml'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows
          - os: macos-latest
            label: macos
          - os: ubuntu-latest
            label: linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Compile and build runnable jar
        shell: bash
        run: |
          set -e
          rm -rf out dist input && mkdir -p out dist input
          cd src
          find . -name '*.java' > /tmp/srcs.txt
          javac -encoding UTF-8 -d ../out @/tmp/srcs.txt
          # copy non-source resources (images, etc.) preserving structure
          find . -type f ! -name '*.java' ! -name '*.form' ! -name '*.iml' -print | while read -r f; do
            mkdir -p "../out/$(dirname "$f")"; cp "$f" "../out/$f"; done
          cd ..
          jar --create --file dist/Ajedrez.jar --main-class ajedrez.Ajedrez -C out .
          cp dist/Ajedrez.jar input/

      - name: Package self-contained app (jpackage)
        shell: bash
        run: |
          EXTRA=""
          if [ "${{ runner.os }}" = "Windows" ]; then EXTRA="--win-console"; fi
          jpackage --type app-image --name Ajedrez --input input --main-jar Ajedrez.jar \
            --main-class ajedrez.Ajedrez --app-version 1.0.0 --dest jp $EXTRA

      - name: Zip (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path jp/* -DestinationPath Ajedrez-windows.zip

      - name: Zip (macOS/Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: cd jp && zip -r ../Ajedrez-${{ matrix.label }}.zip .

      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.label }}
          path: Ajedrez-*.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Publish to Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Ejecutables (autocontenidos)
          body: |
            Apps autocontenidas generadas automaticamente por GitHub Actions.
            No requieren tener Java instalado. Descomprime y ejecuta.
          files: artifacts/**/*.zip
